[pytest]
# WellRing voice agent test configuration

# Where tests live
testpaths = tests

# Default verbosity and output style
# Exclude hardware tests unless explicitly requested with -m hardware
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not hardware"

# Custom markers (prevents PytestUnknownMarkWarning)
markers =
    hardware: marks tests that require real hardware (mic, speaker, GPU) — skipped in CI
    integration: marks end-to-end integration tests
    slow: marks tests that take > 5 s to run

# Minimum pytest version
minversion = 7.0

# Suppress known third-party deprecation warnings that are outside our control
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore:Using `httpx` with `starlette.testclient`:DeprecationWarning
