name: Voice Agent CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ollama openai-whisper fastapi uvicorn

    - name: Check Python files for errors
      run: |
        find . -name "*.py" -not -path "./venv/*" | xargs python -m py_compile
        echo "No  Errors"