name: Voice Agent CI

on:
  push:
    branches: [ main, feature/*, atharva-* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic httpx

    - name: Check Python files for syntax errors
      run: |
        find . -name "*.py" -not -path "./venv/*" | xargs python -m py_compile
        echo "✅ No syntax errors"

    - name: Run scoring engine tests
      run: |
        python src/scoring_engine/test_cases.py