name: WellRing Voice Agent CI

on:
  push:
    branches: [ main, "feature/*", "stage/*" ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Lint + syntax check ─────────────────────────────────────────────
  lint:
    name: Syntax & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install pyflakes

      - name: Compile-check all Python files
        run: |
          find src tests -name "*.py" | xargs python -m py_compile
          echo "✅ All Python files compile cleanly"

      - name: Pyflakes static analysis
        run: |
          python -m pyflakes src/ tests/ || true

  # ── Job 2: Pipeline + Llama + Orchestrator tests (no hardware) ─────────────
  test-unit:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the deps needed for the no-hardware tests
          pip install \
            fastapi==0.136.3 \
            uvicorn \
            pydantic \
            starlette \
            httpx \
            ollama \
            pytest \
            pytest-anyio \
            numpy \
            soundfile \
            sounddevice

      - name: Install Whisper (CPU-only, no ffmpeg GPU)
        run: pip install openai-whisper

      - name: Run pipeline tests (validator / router / logger / FastAPI)
        run: |
          python -m pytest tests/test_pipeline.py -v --tb=short

      - name: Run Llama module tests (mocked Ollama)
        run: |
          python -m pytest tests/test_llama_module.py tests/test_llama.py -v --tb=short

      - name: Run Whisper layer tests (mocked sounddevice + whisper)
        run: |
          python -m pytest tests/test_whisper_layer.py -v --tb=short

      - name: Run TTS layer tests (mocked Piper + sounddevice)
        run: |
          pip install piper-tts || true   # best-effort; tests mock it anyway
          python -m pytest tests/test_tts.py -v --tb=short

      - name: Run orchestrator integration tests (all layers mocked)
        run: |
          python -m pytest tests/test_orchestrator.py -v --tb=short

      - name: Run scoring engine tests (baseline / rules / scoring / alerts)
        run: |
          python -m pytest tests/test_scoring_engine.py -v --tb=short

      - name: Run conversation handler tests (topic detection / response generation)
        run: |
          python -m pytest tests/test_conversation.py -v --tb=short

      - name: Run caregiver notifier tests (webhook mocked)
        run: |
          python -m pytest tests/test_notifier.py -v --tb=short

      - name: Run API endpoint tests (FastAPI TestClient, Llama mocked)
        run: |
          python -m pytest tests/test_api.py -v --tb=short

      - name: Full no-hardware suite summary
        run: |
          # pytest.ini already excludes hardware-marked tests
          python -m pytest tests/ --tb=short -q

  # ── Job 3: FastAPI server smoke test ───────────────────────────────────────
  test-api:
    name: FastAPI smoke test
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic starlette httpx pytest numpy soundfile sounddevice openai-whisper ollama

      - name: Start FastAPI server and hit /health
        run: |
          cd src
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -sf http://127.0.0.1/health || curl -sf http://127.0.0.1:8000/health
          echo "✅ FastAPI /health returned OK"

      - name: POST /assess — health_issue
        run: |
          curl -sf -X POST http://127.0.0.1:8000/assess \
            -H "Content-Type: application/json" \
            -d '{"intent":"health_issue","symptoms":["chest_pain"],"severity":"high","confidence":0.9}' \
            | python -c "import sys,json; d=json.load(sys.stdin); assert d['risk_level'] in ('LOW','MEDIUM','HIGH','CRITICAL'), d"
          echo "✅ POST /assess health_issue passed"

      - name: POST /assess — general_chat
        run: |
          curl -sf -X POST http://127.0.0.1:8000/assess \
            -H "Content-Type: application/json" \
            -d '{"intent":"general_chat","symptoms":[],"severity":"low","confidence":0.8}' \
            | python -c "import sys,json; d=json.load(sys.stdin); assert d['destination']=='general_chat', d"
          echo "✅ POST /assess general_chat passed"

      - name: POST /assess — invalid payload returns 422
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:8000/assess \
            -H "Content-Type: application/json" \
            -d '{"intent":"bad_intent","symptoms":[],"severity":"low","confidence":0.9}')
          [ "$STATUS" = "422" ] && echo "✅ 422 returned correctly" || (echo "❌ Expected 422, got $STATUS" && exit 1)

      - name: GET /history — returns log entries
        run: |
          curl -sf http://127.0.0.1:8000/history \
            | python -c "import sys,json; d=json.load(sys.stdin); assert 'entries' in d and 'count' in d, d"
          echo "✅ GET /history passed"

      - name: GET /history — limit param is respected
        run: |
          curl -sf "http://127.0.0.1:8000/history?limit=1" \
            | python -c "import sys,json; d=json.load(sys.stdin); assert d['count'] <= 1, d"
          echo "✅ GET /history?limit=1 passed"

      - name: POST /transcribe — health_issue (Llama via pre-seeded payload)
        run: |
          # /transcribe calls llama.classify(); Ollama won't be running in CI.
          # We test the 422 path (empty transcript) which exercises Pydantic without Ollama.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:8000/transcribe \
            -H "Content-Type: application/json" \
            -d '{"transcript":""}')
          [ "$STATUS" = "422" ] && echo "✅ /transcribe empty transcript → 422" || (echo "❌ Expected 422, got $STATUS" && exit 1)

      - name: POST /transcribe — missing body returns 422
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:8000/transcribe \
            -H "Content-Type: application/json" \
            -d '{}')
          [ "$STATUS" = "422" ] && echo "✅ /transcribe missing body → 422" || (echo "❌ Expected 422, got $STATUS" && exit 1)

      - name: GET /status — returns readiness report
        run: |
          curl -sf http://127.0.0.1:8000/status \
            | python -c "
import sys, json
d = json.load(sys.stdin)
assert 'ready'   in d,          'missing ready'
assert 'checks'  in d,          'missing checks'
assert 'version' in d,          'missing version'
assert 'ollama'  in d['checks'], 'missing ollama check'
assert 'tts'     in d['checks'], 'missing tts check'
assert 'log'     in d['checks'], 'missing log check'
assert 'webhook' in d['checks'], 'missing webhook check'
print('ready:', d['ready'])
"
          echo "✅ GET /status passed"

      - name: GET /status — webhook not configured in CI
        run: |
          curl -sf http://127.0.0.1:8000/status \
            | python -c "
import sys, json
d = json.load(sys.stdin)
wh = d['checks']['webhook']
assert wh['ok']            is True,  'webhook ok should always be True'
assert wh['configured']    is False, 'WELLRING_WEBHOOK_URL not set in CI'
print('webhook check:', wh)
"
          echo "✅ GET /status webhook check passed"